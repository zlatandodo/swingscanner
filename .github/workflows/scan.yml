name: Refresh scan data

# Optional: re-runs the scanner on a schedule and commits the updated
# data/latest_results.json so the deployed Streamlit app stays fresh.
# Note: Yahoo Finance can rate-limit CI runners; --fast (S&P 500) is the
# safest in CI. Trigger manually any time via the "Run workflow" button.

on:
  schedule:
    - cron: "30 21 * * 1-5"   # weekdays ~17:30 ET (after the US close)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner (fast)
        run: python swing_scanner.py --fast

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_results.json
          git diff --cached --quiet || git commit -m "chore: refresh scan data [skip ci]"
          git push
